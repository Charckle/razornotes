{% extends "main_page_module/base.html" %}

{% block nav_search %}active{% endblock nav_search %}

{% block content %}
<br>
<div class="container-fluid">
  <div class="row">
    <div class="col-md-2"><!-- aside --></div>
    <div class="col-md-8">

      <h1>Hello, there!</h1>
      <input class="form-control" id="search" type="search" placeholder="Search" aria-label="Search" autofocus>
      <hr>
      <div id="results">
        <p>Now search something!</p>
      </div>

      <script>
        const MIN_SEARCH_CHARS = 3;

        function loadResults() {
          const key = document.getElementById('search').value.trim();

          if (key.length < MIN_SEARCH_CHARS) {
            const results = document.getElementById('results');
            results.innerHTML = '';
            const hint = document.createElement('p');
            hint.textContent = 'Type at least ' + MIN_SEARCH_CHARS + ' characters to search.';
            results.appendChild(hint);
            return;
          }

          fetch('/search/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ key })
          })
          .then(r => r.json())
          .then(data => {
            const container = document.createElement('div');
            container.className = 'container';

            if (Object.keys(data).length > 0) {
              for (const [noteId, value] of Object.entries(data)) {
                const card = document.createElement('div');
                card.className = 'd-flex rn-note-card p-2';
                card.style.cssText = 'font-size:12px;border-radius:5px;margin-bottom:5px;';

                const link = document.createElement('a');
                link.className = 'btn align-self-center me-3';
                link.href = '/note_view/' + noteId;
                const img = document.createElement('img');
                img.src  = "{{ url_for('static', filename='icons/note.svg') }}";
                img.height = 32; img.width = 32;
                link.appendChild(img);

                const body = document.createElement('div');
                body.className = 'flex-grow-1';
                const title = document.createElement('h6');
                title.className = 'mt-0';
                title.textContent = value[0];
                const snippet = document.createElement('p');
                snippet.innerHTML = value[1];
                body.appendChild(title);
                body.appendChild(snippet);

                card.appendChild(link);
                card.appendChild(body);
                container.appendChild(card);
              }
            } else {
              const msg = document.createElement('p');
              msg.textContent = "We searched high and low, and found nothing… try being more specific.";
              const newLink = document.createElement('a');
              newLink.textContent = 'Make One';
              newLink.href = "{{ url_for('notes_module.note_new') }}";
              container.appendChild(msg);
              container.appendChild(newLink);
            }

            const results = document.getElementById('results');
            results.innerHTML = '';
            results.appendChild(container);
          });
        }

        let searchTimer = null;
        document.getElementById('search').addEventListener('keyup', function() {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(loadResults, 500);
        });
      </script>

    </div>
    <div class="col-md-2"><!-- aside --></div>
  </div>
</div>
{% endblock content %}
