{% extends "main_page_module/base.html" %}

{% block nav_all_tags %}active{% endblock nav_all_tags %}

{% block content %}
<br>
<div class="container-fluid">
  <br>
  <div class="row">
    <div class="col-md text-center">
      <h5>Options</h5>
    </div>
    <div class="col-md-6">
      <legend>All Tags</legend>
      <div id="all_locations" class="container">
        {% for i in tags %}
        <hr>
        <div class="d-flex align-items-center">
          <a href="{{ url_for('notes_module.tag_edit', tag_id=i['id']) }}" class="me-3">
            <img src="{{ url_for('static', filename='icons/tag.svg') }}" alt="tag" style="width:50px;height:50px;">
          </a>
          <div class="flex-grow-1">
            <h4 class="mt-0">{{ i["name"] }}</h4>
            <span class="badge rounded-pill text-bg-{{ NotesS.list_tag_colors(i['color']) }}">Color</span>
          </div>
        </div>
        {% endfor %}
      </div>
      <hr>
    </div>
    <div class="col-md"><!-- aside --></div>
  </div>
</div>
{% endblock content %}
